<!doctype html>
<html lang="{{ site.locale | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}{% if site.title %} - {{ site.title }}{% endif %}</title>
    {% if page.description or site.description %}
      <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines }}">
    {% endif %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/minimal-academic.css' | relative_url }}">
  </head>
  <body>
    <main class="site-shell">
      {{ content }}

      <footer class="site-footer">
        <span>&copy; {{ 'now' | date: '%Y' }} {{ site.author.name | default: site.name }}.</span>
        <a href="{{ '/sitemap/' | relative_url }}">Sitemap</a>
      </footer>
    </main>
  </body>
</html>
